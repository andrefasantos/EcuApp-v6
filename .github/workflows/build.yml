name: build-apk

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Localizar projeto (acha o gradlew)
        id: proj
        run: |
          gw=$(find . -name gradlew -type f | head -1)
          if [ -z "$gw" ]; then echo "gradlew nao encontrado no repo"; exit 1; fi
          dir=$(dirname "$gw")
          echo "Projeto em: $dir"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EcuControl-debug-apk
          path: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
